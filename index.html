<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>割引計算アプリ</title>
<style>
  body {
    font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
    background-color: #f4f7f6;
    color: #333;
    padding: 20px;
    margin: 0;
    display: flex;
    justify-content: center;
  }
  .app-container {
    width: 100%;
    max-width: 400px;
    background: #ffffff;
    padding: 25px;
    border-radius: 16px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
  }
  .input-group {
    margin-bottom: 20px;
  }
  .input-group label {
    display: block;
    font-size: 14px;
    color: #666;
    margin-bottom: 5px;
  }
  input[type="number"] {
    width: 100%;
    padding: 15px;
    font-size: 28px;
    text-align: right;
    border: 2px solid #ccc;
    border-radius: 10px;
    box-sizing: border-box;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="number"]:focus {
    border-color: #4caf50;
  }
  .history {
    font-size: 13px;
    color: #888;
    min-height: 20px;
    margin-bottom: 5px;
    word-wrap: break-word;
  }
  .result-box {
    background: #e8f5e9;
    padding: 20px;
    border-radius: 10px;
    text-align: right;
    margin-bottom: 25px;
  }
  .result-box h2 {
    margin: 0;
    font-size: 36px;
    color: #2e7d32;
  }
  .btn-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  button {
    padding: 15px;
    font-size: 16px;
    font-weight: bold;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    color: white;
    transition: transform 0.1s, opacity 0.2s;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
  }
  button:active {
    transform: scale(0.96);
  }
  .btn-percent { background: #ff9800; }
  .btn-amount { background: #e91e63; }
  .btn-reset { 
    grid-column: span 2; 
    background: #757575; 
    margin-top: 10px;
  }
</style>
</head>
<body>

  <div class="app-container">
    <div class="input-group">
      <label for="inputPrice">元の金額 (最大6桁)</label>
      <input type="number" id="inputPrice" placeholder="例: 128000" oninput="handleInput()">
    </div>

    <div class="history" id="historyText">適用順: なし</div>
    
    <div class="result-box">
      <h2 id="resultPrice">0円</h2>
    </div>

    <div class="btn-grid">
      <button class="btn-percent" onclick="applyDiscount(0.5, '50%OFF')">50% OFF</button>
      <button class="btn-percent" onclick="applyDiscount(0.75, '25%OFF')">25% OFF</button>
      <button class="btn-percent" onclick="applyDiscount(0.9, '10%OFF')">10% OFF</button>
      <button class="btn-amount" onclick="applyMinus(1000, '1000円引')">1000円 引</button>
      <button class="btn-amount" onclick="applyMinus(500, '500円引')">500円 引</button>
      <button class="btn-reset" onclick="resetCalculations()">リセット (元に戻す)</button>
    </div>
  </div>

  <script>
    let currentPrice = 0;
    let discountHistory = [];

    function handleInput() {
      const input = document.getElementById('inputPrice');
      // 6桁以上の入力があった場合は切り捨てるように変更
      if (input.value.length > 6) {
        input.value = input.value.slice(0, 6);
      }
      
      resetToInput();
    }

    function applyDiscount(rate, label) {
      if (currentPrice <= 0) return; 
      
      currentPrice = Math.floor(currentPrice * rate);
      discountHistory.push(label);
      updateDisplay();
    }

    function applyMinus(amount, label) {
      if (currentPrice <= 0) return; 
      
      currentPrice = currentPrice - amount;
      if (currentPrice < 0) currentPrice = 0;
      
      discountHistory.push(label);
      updateDisplay();
    }

    function resetToInput() {
      const inputVal = document.getElementById('inputPrice').value;
      currentPrice = parseInt(inputVal) || 0;
      discountHistory = [];
      updateDisplay();
    }

    function resetCalculations() {
      document.getElementById('inputPrice').value = '';
      currentPrice = 0;
      discountHistory = [];
      updateDisplay();
    }

    function updateDisplay() {
      document.getElementById('resultPrice').innerText = currentPrice.toLocaleString() + '円';
      
      if (discountHistory.length > 0) {
        document.getElementById('historyText').innerText = '適用順: ' + discountHistory.join(' ➔ ');
      } else {
        document.getElementById('historyText').innerText = '適用順: なし';
      }
    }
  </script>

</body>
</html>
